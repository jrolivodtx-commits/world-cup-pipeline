name: Run Football Data Pipeline

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch:      

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5 # Upgraded from v4 to clear the warning

    - name: Set up Python
      uses: actions/setup-python@v6 # Upgraded from v5 to clear the warning
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests

    - name: Run Python Script
      run: python fetch_wc_data.py

    - name: Commit and Push CSV file back to repository
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add world_cup_matches.csv
        git commit -m "Automated update of World Cup scores" || exit 0
        git push
